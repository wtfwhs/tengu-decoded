tools:
  - name: "Bash"
    internal_name: "WD"
    description: "Execute bash commands with optional timeout"
    category: "read-only"
    notes: "Read-only in plan mode"
  - name: "Read"
    internal_name: "_B"
    description: "Read files from the local filesystem"
    category: "read-only"
  - name: "Write"
    internal_name: "R1"
    description: "Write/create files on the local filesystem"
    category: "write"
    notes: "Blocked in plan mode"
  - name: "Edit"
    internal_name: "rB"
    description: "Perform exact string replacements in files"
    category: "write"
    notes: "Blocked in plan mode"
  - name: "Glob"
    internal_name: "nf"
    description: "Fast file pattern matching (glob patterns)"
    category: "read-only"
  - name: "Grep"
    internal_name: "t8"
    description: "Content search built on ripgrep"
    category: "read-only"
  - name: "WebFetch"
    internal_name: null
    description: "Fetch and process web content"
    category: "read-only"
  - name: "WebSearch"
    internal_name: "yC"
    description: "Web search with AI processing"
    category: "read-only"
  - name: "NotebookEdit"
    internal_name: "aW"
    description: "Edit Jupyter notebook cells"
    category: "write"
    notes: "Blocked in plan mode"
  - name: "Task"
    internal_name: "f0"
    description: "Launch subagents for complex tasks"
    category: "read-only"
  - name: "AskUserQuestion"
    internal_name: "WG"
    description: "Ask the user clarifying questions"
    category: "read-only"
  - name: "EnterPlanMode"
    internal_name: null
    description: "Transition to plan mode"
    category: "read-only"
  - name: "ExitPlanMode"
    internal_name: null
    description: "Exit plan mode (request approval)"
    category: "read-only"
  - name: "TodoWrite"
    internal_name: "O5"
    description: "Create/manage task lists"
    category: "read-only"
    notes: "Allowed in plan mode"
  - name: "Teammate"
    internal_name: null
    description: "Manage teams and coordinate agents"
    category: "read-only"
  - name: "SendMessage"
    internal_name: null
    description: "Send messages to teammates"
    category: "read-only"
  - name: "Skill"
    internal_name: "CJ"
    description: "Execute registered skills"
    category: "read-only"

schema_serialisation:
  function: "SC$()"
  fields:
    - "name"
    - "description (dynamic, via tool.prompt())"
    - "input_schema (JSON Schema)"
    - "strict (only when tengu_tool_pear enabled)"
    - "input_examples (only when scarf_coffee beta active)"
    - "defer_loading (for lazy-loaded tools)"
    - "cache_control (prompt caching hints)"

permission_modes:
  - mode: "default"
    description: "Ask for permission on each tool use"
  - mode: "plan"
    description: "Read-only tools only, require approval for plan"
  - mode: "acceptEdits"
    description: "Auto-accept file edits, ask for bash"
  - mode: "dontAsk"
    description: "Auto-accept most operations"
  - mode: "bypassPermissions"
    description: "Skip all permission checks (teams/subagents)"
  - mode: "delegate"
    description: "Delegate mode for team coordination"
