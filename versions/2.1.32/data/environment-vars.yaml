variables:
  # Core Configuration
  - name: "ANTHROPIC_API_KEY"
    category: "core"
    purpose: "Primary API key"
  - name: "ANTHROPIC_BASE_URL"
    category: "core"
    purpose: "Custom API base URL"
  - name: "ANTHROPIC_MODEL"
    category: "core"
    purpose: "Override model selection"
  - name: "ANTHROPIC_BETAS"
    category: "core"
    purpose: "Comma-separated API beta flags"
  - name: "CLAUDE_CODE_API_BASE_URL"
    category: "core"
    purpose: "Custom API base URL (alternate)"

  # Cloud Providers
  - name: "CLAUDE_CODE_USE_BEDROCK"
    category: "cloud-providers"
    purpose: "Enable AWS Bedrock"
  - name: "CLAUDE_CODE_USE_VERTEX"
    category: "cloud-providers"
    purpose: "Enable Google Vertex"
  - name: "CLAUDE_CODE_USE_FOUNDRY"
    category: "cloud-providers"
    purpose: "Enable Microsoft Foundry"
  - name: "ANTHROPIC_BEDROCK_BASE_URL"
    category: "cloud-providers"
    purpose: "Bedrock base URL"
  - name: "ANTHROPIC_VERTEX_BASE_URL"
    category: "cloud-providers"
    purpose: "Vertex base URL"
  - name: "ANTHROPIC_FOUNDRY_BASE_URL"
    category: "cloud-providers"
    purpose: "Foundry base URL"

  # Model Overrides
  - name: "ANTHROPIC_DEFAULT_OPUS_MODEL"
    category: "model-overrides"
    purpose: "Override Opus model"
  - name: "ANTHROPIC_DEFAULT_SONNET_MODEL"
    category: "model-overrides"
    purpose: "Override Sonnet model"
  - name: "ANTHROPIC_DEFAULT_HAIKU_MODEL"
    category: "model-overrides"
    purpose: "Override Haiku model"
  - name: "ANTHROPIC_SMALL_FAST_MODEL"
    category: "model-overrides"
    purpose: "Override small/fast model"
  - name: "CLAUDE_CODE_SUBAGENT_MODEL"
    category: "model-overrides"
    purpose: "Override subagent model"

  # Agent Teams
  - name: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
    category: "agent-teams"
    purpose: "Enable agent teams (client-side)"
  - name: "CLAUDE_CODE_PLAN_V2_AGENT_COUNT"
    category: "agent-teams"
    purpose: "Override teammate limit (1-10)"
  - name: "CLAUDE_CODE_PLAN_V2_EXPLORE_AGENT_COUNT"
    category: "agent-teams"
    purpose: "Override explore agent count (1-10)"
  - name: "CLAUDE_CODE_TEAM_NAME"
    category: "agent-teams"
    purpose: "Team name"
  - name: "CLAUDE_CODE_AGENT_NAME"
    category: "agent-teams"
    purpose: "Agent name"

  # Behaviour Controls
  - name: "CLAUDE_CODE_EFFORT_LEVEL"
    category: "behaviour-controls"
    purpose: "Reasoning effort level"
  - name: "CLAUDE_CODE_MAX_OUTPUT_TOKENS"
    category: "behaviour-controls"
    purpose: "Max output tokens"
  - name: "CLAUDE_CODE_MAX_RETRIES"
    category: "behaviour-controls"
    purpose: "Max API retries"
  - name: "CLAUDE_CODE_MAX_TOOL_USE_CONCURRENCY"
    category: "behaviour-controls"
    purpose: "Tool execution concurrency"
  - name: "CLAUDE_CODE_AUTOCOMPACT_PCT_OVERRIDE"
    category: "behaviour-controls"
    purpose: "Auto-compact threshold"
  - name: "CLAUDE_CODE_SIMPLE"
    category: "behaviour-controls"
    purpose: "Minimal system prompt mode"
  - name: "CLAUDE_CODE_BLOCKING_LIMIT_OVERRIDE"
    category: "behaviour-controls"
    purpose: "Override rate limit blocking"

  # Experimental / Hidden
  - name: "ENABLE_BTW"
    category: "experimental"
    purpose: "Enable /btw side-question feature"
  - name: "ENABLE_LSP_TOOL"
    category: "experimental"
    purpose: "LSP integration tool"
  - name: "ENABLE_EXPERIMENTAL_SHELL_BUILTINS"
    category: "experimental"
    purpose: "Experimental shell builtins"
  - name: "ENABLE_SESSION_BACKGROUNDING"
    category: "experimental"
    purpose: "Session backgrounding"
  - name: "ENABLE_SESSION_PERSISTENCE"
    category: "experimental"
    purpose: "Session persistence"
  - name: "ENABLE_SUBAGENT_ZOOM"
    category: "experimental"
    purpose: "Subagent zoom"
  - name: "ENABLE_TENTATIVE_ERA"
    category: "experimental"
    purpose: "Unknown experimental feature"
  - name: "USE_API_CONTEXT_MANAGEMENT"
    category: "experimental"
    purpose: "API-side context management"
    notes: "Hardcoded false"
  - name: "CLAUDE_CODE_ADDITIONAL_PROTECTION"
    category: "experimental"
    purpose: "Additional security protection"
  - name: "CLAUDE_CODE_GLOB_HIDDEN"
    category: "experimental"
    purpose: "Glob search hidden files"
  - name: "CLAUDE_CODE_GLOB_NO_IGNORE"
    category: "experimental"
    purpose: "Glob search gitignored files"
  - name: "CLAUDE_CODE_FORCE_GLOBAL_CACHE"
    category: "experimental"
    purpose: "Force global prompt caching"
  - name: "CLAUDE_CODE_ATTRIBUTION_HEADER"
    category: "experimental"
    purpose: "Override attribution header"
  - name: "CLAUDE_CODE_ENTRYPOINT"
    category: "experimental"
    purpose: "Entrypoint identifier"
  - name: "FALLBACK_FOR_ALL_PRIMARY_MODELS"
    category: "experimental"
    purpose: "Force model fallback"

  # Disable Switches
  - name: "CLAUDE_CODE_DISABLE_AUTO_MEMORY"
    category: "disable-switches"
    purpose: "Disable auto memory"
  - name: "CLAUDE_CODE_DISABLE_ATTACHMENTS"
    category: "disable-switches"
    purpose: "Disable file attachments"
  - name: "CLAUDE_CODE_DISABLE_BACKGROUND_TASKS"
    category: "disable-switches"
    purpose: "Disable background tasks"
  - name: "CLAUDE_CODE_DISABLE_CLAUDE_MDS"
    category: "disable-switches"
    purpose: "Disable CLAUDE.md loading"
  - name: "CLAUDE_CODE_DISABLE_COMMAND_INJECTION_CHECK"
    category: "disable-switches"
    purpose: "Disable command injection checks"
  - name: "CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS"
    category: "disable-switches"
    purpose: "Disable experimental betas"
  - name: "CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY"
    category: "disable-switches"
    purpose: "Disable feedback surveys"
  - name: "CLAUDE_CODE_DISABLE_FILE_CHECKPOINTING"
    category: "disable-switches"
    purpose: "Disable file checkpointing"
  - name: "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC"
    category: "disable-switches"
    purpose: "Disable non-essential network"
  - name: "CLAUDE_CODE_DISABLE_TERMINAL_TITLE"
    category: "disable-switches"
    purpose: "Disable terminal title changes"

  # Telemetry Controls
  - name: "DISABLE_TELEMETRY"
    category: "telemetry"
    purpose: "Master kill switch for Segment/Datadog"
  - name: "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC"
    category: "telemetry"
    purpose: "Disables non-essential network calls"
  - name: "DISABLE_ERROR_REPORTING"
    category: "telemetry"
    purpose: "Disables error reporting"
  - name: "CLAUDE_CODE_ENABLE_TELEMETRY"
    category: "telemetry"
    purpose: "Explicit telemetry enable"
