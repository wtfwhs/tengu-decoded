# vs 2.1.169). Churn: NEW design-login, pause-memory; REMOVED bridge-kick, standalone toggle-memory.
#
# Status semantics:
#   enabled        -> isEnabled absent or always-true; isHidden absent/false
#   conditional    -> isEnabled gated by a flag / capability / mode / env var
#   hidden         -> isHidden: !0 (or getter true) — runs but not listed in /help
#   disabled       -> isEnabled: () => !1 (cannot run)
#   stub           -> object is the shared disabled+hidden "stub" placeholder (WNo) in THIS build
#   upsell-stub    -> wrapped by uTt() = hidden "available with Claude for Enterprise" upsell
#   skill          -> registered via Bd() as a userInvocable skill-command, NOT a registry object
