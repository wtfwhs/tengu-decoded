#
# Source of truth: command registry module exporting getCommands (gA), getBuiltinCommands
# (EVo -> yen()), isCommandEnabled (rx), meetsAvailabilityRequirement (VTt),
# INTERNAL_ONLY_COMMANDS (Tsm), ANT_GATED_COMMANDS (vsm), REMOTE_SAFE_COMMANDS (Zcr),
# BRIDGE_SAFE_COMMANDS (TVo).  cli.beauty.js ~476k-581k & 605k-665k.
