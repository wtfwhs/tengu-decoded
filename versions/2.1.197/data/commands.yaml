  immediate: "Run the moment Enter is pressed without sending a turn to the model (e.g. /usage, /btw, /fast via YHt())."
  supportsNonInteractive: "Command allowed in headless/-p runs (e.g. /clear, /compact, /usage, /heapdump, /config-headless, /reload-skills)."
  thinClientDispatch: "Some commands route over the thin-client bridge: control-request (/config-jsx, /usage-jsx, /fast, /remote-control) or post-text (/reload-skills)."
  requires: "Capability prerequisites, e.g. /daemon, /usage, /fast require {ink:!0} (needs the TUI renderer)."
  fleetHostCall: "/heapdump uses fleetHostCall instead of a plain load (runs on the fleet host)."
  dual_variants: "/config, /usage, /context, /autocompact, /usage-credits, /goal, /effort, /exit, /model, /stop, /rename, /color ship interactive local-jsx + headless local twins gated by Cr()/!Cr(); the unfit one is isHidden."

