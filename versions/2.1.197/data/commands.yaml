command_filtering_pipeline:
  getCommands_gA: "581288 — loads builtins (yen) + skills + plugins, filters by VTt(availability) && rx(isEnabled), merges MCP/plugin commands not already present, de-dupes by name/skillRoot."
  getBuiltinCommands_EVo: "581237 -> yen() (581712), a memoized array of ~93 command-object const refs with conditional spreads (e.g. gateway-only o3l, first-party-only entries)."
  isCommandEnabled_rx: "387319 — return cmd.isEnabled?.() ?? !0 (absent isEnabled = enabled)."
  immediate_resolver_B$e: "387325 — typeof immediate === 'function' ? immediate(ctx) : immediate === !0."
  filterCommandsForHeadless: "Yme — drops commands unsuited to non-interactive (Cr()) runs."
  filterCommandsForRemoteMode: "CVo — restricts to REMOTE_SAFE_COMMANDS when running as a remote/cloud agent."
  REMOTE_SAFE_COMMANDS: "Zcr (581747) — Set of command const refs usable inside a remote/cloud session."
  BRIDGE_SAFE_COMMANDS: "TVo (581747) — Set of command const refs dispatchable over the Remote Control bridge."
  INTERNAL_ONLY_COMMANDS: "Tsm (581712) — internal/system commands incl. the disabled 'stub' (WNo, 478399)."
  ANT_GATED_COMMANDS: "vsm (581562) = [hen, yVo, _Vo, bVo].filter(Boolean) — all four are null (581562-581565), so ANT_GATED is EMPTY (same as 2.1.169)."

