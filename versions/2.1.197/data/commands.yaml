# Gate helpers (resolved from source, with 2.1.169 name):
#   Ao()   -> first-party + oauth scopes (logged into claude.ai)          [134427]  (was hq())
#   Cr()   -> !Bt.isInteractive  (HEADLESS / non-interactive run)         [3268]    (was F6())
#   $x()   -> Bt.isInteractive                                            [3271]    (was a2())
#   _a()   -> Bt.caps.workspace === "remote" (cloud/remote agent)         [3929]    (was z4())
#   Jv()   -> coordinator mode (CLAUDE_CODE_COORDINATOR_MODE)             [225052]  (was K2())
#   js(c)  -> capability check (allow_remote_sessions, allow_design_sync) [145859]  (was b7(c))
#   Eu()   -> assume first-party base URL (console availability)          [94683]
#   j7()   -> !xc()  (used in "console" availability)                     [134540]
#   it(f,d)-> GrowthBook flag get                                         [145150]  (was j$())
#   mz()   -> advisor available (firstParty + tengu_sage_compass2.enabled / env) [363791] (was HB())
#   LC()   -> remote-control connectable                                 [605232]  (was jh())
#   RSt()  -> js(allow_design_sync) && !Ki() && (xc() || tengu_slate_quill) [430834]
#   Y_t()  -> usage-credits available (R0() balance or Uke())            [378623]  (was VK$())
#   TOl()  -> autofix-pr gate (Ao() && allow_remote_sessions && !Cr())   [477315]  (was xF4())
#   LNl()  -> autocompact gate                                           [482730]  (was og4())
#   Ime()  -> ultraplan gate                                             [535850]  (was B4H())
#   yz()   -> ultrareview / review gate                                  [374636]  (was kg())
#   BZt()  -> voice available                                            [571416]  (was Pu$())
#   iE()   -> workflows available                                        [146597]  (was RP())
#   lAt()  -> V$f() && js(allow_desktop_handoff); V$f()=()=>!1 so always false [482049] (was Cg4())
#   uc()   -> fast mode available                                        [100600]
#   YHt()  -> /fast immediate                                            [546638]

