version: 2.1.197
build: 2026-06-29T19:08:42Z
git_sha: c8fd8048f30950a21d28734718275aa7e97f5143
runtime: Bun v1.4.0 standalone
platform_analyzed: linux-x86_64
scope: full_device_fingerprint
note: >-
  Device fingerprinting for Claude Code 2.1.197. Symbols are per-build minified
  names (change every release); 2.1.169 equivalents given as was_*. The marquee
  delta vs 2.1.169 is the NEW machineID random token (z5t) sent only as a
  12-char redacted hostname in error reports. Identity model shape is otherwise
  unchanged. Soft env/runtime/network signals (entrypoint/terminal/shell/locale)
  are owned by the env/telemetry analysis and only summarised here.

machine_identity:

  device_id:
    # What is actually transmitted as device_id / user_id / user.id.
    getter: vW
    was: cU
    alias: getOrCreateUserID
    line: cli.beauty.js:606434
    source: persisted random token in global config
    generation: crypto.randomBytes(32).toString("hex")   # 64 hex chars, 256-bit
    crypto_module: require("crypto")   # b6o
    storage: global config (Pt() read / yn() write); ~/.claude.json or $CLAUDE_CONFIG_DIR
    config_field: userID
    in_process_cache: p6o
    stable: across sessions
    scope: per-install / per-config-dir   # NOT per-hardware
    derived_from_hardware: false
    hashed_before_transmission: false
    salted: false
    truncated: false
    survives_logout: true
    local_hash_only:
      where: Datadog sampling bucket
      function: zdm
      was: XS_
      line: cli.beauty.js:606744
      formula: parseInt(sha256(vW()).slice(0,8),16) % 30   # Vdm = 30
      transmitted: false   # only the 0-29 integer is sent
    transmitted_as:
      - { field: device_id, context: "Messages API metadata blob, JSON.stringify into user_id", line: cli.beauty.js:594865 }
      - { field: deviceId,  context: "central metadata bundle nit", line: cli.beauty.js:135412 }
      - { field: user_id,   context: "first-party event sink", line: cli.beauty.js:144700 }
      - { field: device_id, context: "GrowthBook experiment event", line: cli.beauty.js:144755 }
      - { field: id/deviceID, context: "GrowthBook attributes", line: cli.beauty.js:145083 }
      - { field: "user.id", context: "third-party OTel resource attrs", line: cli.beauty.js:191299 }

  machine_id_random_token:
    # NEW in 2.1.197 — a SECOND persisted random token, NOT hardware-derived.
    new_in: 2.1.197
    getter: z5t
    alias: getOrCreateMachineID
    line: cli.beauty.js:606453
    export: cli.beauty.js:605582
    generated_eagerly_at_startup: cli.beauty.js:617835
    generation: crypto.randomBytes(32).toString("hex")   # same construction as userID
    config_field: machineID
    in_process_cache: f6o
    derived_from_hardware: false
    hardware_machine_id: false   # despite the name, no ioreg/registry/etc.-machine-id read
    transmitted_as:
      - field: host_name_redacted
        value: z5t().slice(0,12)   # first 12 hex chars only
        context: error/crash report payload (Datadog-style ddtags/ddsource)
        line: cli.beauty.js:299471
        purpose: privacy-redacted stand-in for the real hostname; correlates crashes per-install without exposing hostname/hw-uuid
    sent_raw_anywhere_else: false

  hardware_machine_id:
    purpose: OpenTelemetry host.id (vendored node-machine-id style detector)
    getter: getMachineId
    dispatcher: { function: zBd, line: cli.beauty.js:141115, behaviour: lazy require per process.platform, memoised (nGe) }
    bundled_at:
      - cli.beauty.js:141016   # first copy of @opentelemetry/resources
      - cli.beauty.js:335462   # second copy (byte-identical)
    hashed: false
    salted: false
    truncated: false
    transmitted_by_default: false
    notes: >-
      Raw platform UUID/GUID returned unmodified. Read only by the OTel hostDetector.
      Even with OTel enabled, the 3P resource builder (cli.beauty.js:337605) keeps ONLY
      host.arch and discards host.id and host.name, so the hardware id never leaves.
    platforms:
      darwin:
        command: 'ioreg -rd1 -c "IOPlatformExpertDevice"'
        parse: 'find line containing IOPlatformUUID, split on the " = " separator, value minus trailing quote'
        line: cli.beauty.js:141018
      linux:
        files: [/etc/machine-id, /var/lib/dbus/machine-id]
        parse: readFile(utf8).trim(), first existing wins
        line: cli.beauty.js:141037
      freebsd:
        sources:
          - { file: /etc/hostid }
          - { command: kenv -q smbios.system.uuid }
        parse: trim()
        line: cli.beauty.js:141058
      win32:
        command: '%windir%\System32\REG.exe QUERY HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography /v MachineGuid'
        registry_key: HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography
        registry_value: MachineGuid
        wow64_shim: 'uses %windir%\sysnative\cmd.exe when arch==ia32 and PROCESSOR_ARCHITEW6432 in env'
        parse: 'split on "REG_SZ", take [1].trim()'
        line: cli.beauty.js:141083
      default:
        result: undefined
        log: 'could not read machine-id: unsupported platform'
        line: cli.beauty.js:141102
    error_handling: 'try/catch each read; on failure only diag.debug("error reading machine id: ...")'

  third_party_resource_builder:
    function_line: cli.beauty.js:337585
    was: Kf4 (cli.beauty.js:325308)
    gate_env: CLAUDE_CODE_ENABLE_TELEMETRY   # checked at cli.beauty.js:337808
    behaviour: >-
      Merges service.name/version, osDetector (os.type, os.version), and from hostDetector
      ONLY host.arch. host.id and host.name are explicitly dropped at cli.beauty.js:337608.
    keeps_only_host_arch_line: cli.beauty.js:337608

  first_party_resource_builder:
    function_line: cli.beauty.js:144794
    behaviour: hand-builds {service.name:"claude-code", service.version:"2.1.197", wsl.version?}; no host/os/process detectors run
    transport: { url: "{baseUrl}/api/event_logging/v2/batch", batch: 200, delay_ms: 100, line: cli.beauty.js:144253 }

  host_resource_attributes:
    detectors:
      hostDetector: { class: SNi, line: cli.beauty.js:141176, emits: ["host.name", "host.arch", "host.id"] }
      osDetector:   { class: TNi, line: cli.beauty.js:141197, emits: ["os.type", "os.version"] }
    attributes:
      - { name: host.id,   source: getMachineId() hardware UUID, transmitted: false, identifying: high }   # stripped
      - { name: host.name, source: os.hostname(), transmitted: false, identifying: high }                  # stripped
      - { name: host.arch, source: normalizeArch(os.arch()), transmitted: true, identifying: low }
      - { name: os.type,   source: normalizeType(os.platform()), transmitted: true, identifying: low }
      - { name: os.version, source: os.release(), transmitted: true, identifying: medium }
      - { name: wsl.version, source: "Wt()==wsl -> H2e()", transmitted: true, identifying: low, line: cli.beauty.js:337603 }
      - { name: terminal.type, source: iP.terminal, transmitted: true, identifying: low, line: cli.beauty.js:191331 }

hashing_primitives:
  createHash_call_sites: { sha256: 47, sha1: 6, md5: 2 }
  only_identity_hash: "Datadog sampling bucket sha256(vW())%30 (zdm, cli.beauty.js:606744); never transmitted, only the 0-29 integer"
  reversible_encodings:
    - "user.account_id = iJi('user', accountUuid) -> user_01<base58> (cli.beauty.js:191264)"
  all_other_identifiers: plaintext   # device_id, accountUuid, organizationUuid, email, sessionId

identity_fields:
  - name: userID
    aka: [device_id, distinctId, "user.id"]
    role: canonical anonymous/distinct id (device-scoped)
    accessor: "vW() cli.beauty.js:606434"
    persisted_to: "~/.claude.json key userID"
    hashed: false
    sent_to: [anthropic_api, growthbook, datadog_bucket, otel, first_party_events]
  - name: machineID
    aka: [host_name_redacted]
    role: NEW second random token; redacted hostname stand-in for error reports
    accessor: "z5t() cli.beauty.js:606453"
    persisted_to: "~/.claude.json key machineID"
    hashed: false
    transmitted: "only z5t().slice(0,12) in error payload (cli.beauty.js:299471)"
  - name: accountUuid
    aka: [account_uuid, "user.account_uuid"]
    source: "oauthAccount (Oc()); env CLAUDE_CODE_ACCOUNT_UUID"
    validator: "$xi() length>=8 passthrough, NOT a hash (cli.beauty.js:135383, r$d=8)"
    hashed: false
    sent_to: [anthropic_api, growthbook, datadog, otel, first_party_events, trusted_device_enroll]
  - name: organizationUuid
    aka: [organization_uuid, "organization.id"]
    source: oauthAccount; env CLAUDE_CODE_ORGANIZATION_UUID
    hashed: false
    sent_to: [growthbook, datadog, otel, first_party_events, trusted_device_enroll]
  - name: emailAddress
    aka: [email, "user.email"]
    role: account email (PII)
    source: "oauthAccount.emailAddress; env CLAUDE_CODE_USER_EMAIL"
    central_getter: "t$d() is a STUB returning undefined (cli.beauty.js:135376)"
    hashed: false
    plaintext_pii: true
    sent_to: [otel, oidc_gateway]
    not_sent_to: [growthbook, first_party_events, anthropic_api_metadata]
    otel_emit: "unconditional, no env gate (cli.beauty.js:191324)"
  - name: sessionId
    aka: [session_id, "session.id", CLAUDE_CODE_SESSION_ID]
    source: "randomUUID(); accessor Lt()"
    hashed: false
    sent_to: [anthropic_api, growthbook, datadog, otel, first_party_events]
  - name: user.account_id
    role: base58-encoded reversible tagged account id (user_01<base58>)
    source: "iJi('user', accountUuid) cli.beauty.js:191264"
    env_override: CLAUDE_CODE_ACCOUNT_TAGGED_ID
    hashed: false
    encoding: base58
    sent_to: [otel]
    gate: OTEL_METRICS_INCLUDE_ACCOUNT_UUID
  - name: userBucket
    role: sampling bucket 0-29 (only hashed identity derivative)
    source: "parseInt(sha256(vW()).slice(0,8),16) % 30 (zdm cli.beauty.js:606744)"
    hashed: true
    hash_algo: sha256
    sent_to: [datadog, error_reports]
  - name: userType
    value: external   # hard-coded
    sent_to: [growthbook, datadog, otel, first_party_events]
  - name: messages_api_user_id
    aka: [metadata.user_id]
    role: per-request identity blob on Anthropic Messages API
    source: "JSON.stringify({...CLAUDE_CODE_EXTRA_METADATA, device_id:vW(), account_uuid, session_id:Lt()}) cli.beauty.js:594863"
    hashed: false
    plaintext_structured: true
    sent_to: [anthropic_api]

