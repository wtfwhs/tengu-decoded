trust_mechanisms:
  trusted_device_token:
    summary: >
      Opaque server-issued bearer string gating Remote-Control / bridge features. NOT
      computed locally, NOT derived from machine id. Only the hostname is sent at enrollment.
    enroll_fn_line: cli.beauty.js:298940
    env_override: CLAUDE_TRUSTED_DEVICE_TOKEN   # takes precedence (cli.beauty.js:298951)
    obtained_via:
      method: POST
      url: "{BASE_API_URL}/api/auth/trusted_devices"
      auth: "Bearer <oauth access_token>"
      request_body: { display_name: "Claude Code on ${os.hostname()} · linux" }
      line: cli.beauty.js:298974
      response_field: device_token
    stored_in: ".credentials.json -> trustedDeviceToken (plaintext, chmod 0600)"
    stored_reader_line: cli.beauty.js:299036
    sent_as_header: X-Trusted-Device-Token
    header_injection_sites: [cli.beauty.js:297738, cli.beauty.js:358458, cli.beauty.js:361591, cli.beauty.js:567412, cli.beauty.js:623109]
    scope: "Remote Control / bridge ONLY (never inference traffic)"
    machine_bound: false
    gates:
      - { name: tengu_sessions_elevated_auth_enforcement, const: F3n, default: false, line: cli.beauty.js:299014 }
      - { name: require_trusted_devices, const: N5t, check: "isPolicyAllowed / isPolicyEnforced", line: cli.beauty.js:299015 }
      - { name: tengu_sessions_elevated_auth_disable_proactive_enrollment, const: MUa, default: false, line: cli.beauty.js:299016 }
    telemetry: "bridge_trusted_device_enroll (request_failed|http_error|missing_token|storage_failed|unexpected_error)"

  oauth:
    client_id_prod: "9d1c250a-e61b-44d9-88ed-5944d1962f5e"   # cli.beauty.js:40771 (unchanged)
    client_id_local_dev: "22422756-60c9-4084-8eb7-27705fd5cf9a"   # cli.beauty.js:40704 (unchanged)
    client_id_env_override: CLAUDE_CODE_OAUTH_CLIENT_ID   # cli.beauty.js:40742
    endpoints:
      console_authorize: "https://platform.claude.com/oauth/authorize"
      claude_ai_authorize: "https://claude.com/cai/oauth/authorize"
      token: "https://platform.claude.com/v1/oauth/token"
      create_api_key: "https://api.anthropic.com/api/oauth/claude_cli/create_api_key"
      profile: "{BASE_API_URL}/api/oauth/profile (cli.beauty.js:95085)"
      claude_cli_profile: "{BASE_API_URL}/api/claude_cli_profile (cli.beauty.js:95064)"
    pkce:
      method: S256
      challenge_append_line: cli.beauty.js:95175
      code_verifier: base64url(randomBytes(32))
      code_challenge: base64url(sha256(verifier))
      state: base64url(randomBytes(32))
    scopes:
      user_inference: "user:inference"
      user_profile: "user:profile"
      org_create_api_key: "org:create_api_key"
      remote_control: "user:sessions:claude_code"
      mcp_servers: "user:mcp_servers"
      file_upload: "user:file_upload"
      design: ["user:design:read", "user:design:write"]   # NEW design scopes (cli.beauty.js:40759)
      projects: ["user:projects:read", "user:projects:write"]
      def_line: cli.beauty.js:40750
    device_identifiers_sent: "NONE (no machine-id/MAC/hw-uuid); only hostname in trusted-device display_name"
    client_platform_header: anthropic-client-platform   # entrypoint-derived

  provider_selector:
    fn: yr
    line: cli.beauty.js:94637
    order: [gateway, bedrock, foundry, anthropicAws, mantle, vertex, firstParty]   # NEW: gateway plane first via Lm()
    env_map: { CLAUDE_CODE_USE_BEDROCK: bedrock, CLAUDE_CODE_USE_FOUNDRY: foundry, CLAUDE_CODE_USE_ANTHROPIC_AWS: anthropicAws, CLAUDE_CODE_USE_MANTLE: mantle, CLAUDE_CODE_USE_VERTEX: vertex, default: firstParty }
    role: provider data-residency routing; gates OAuth/trusted-device/Datadog; NOT an IP/country geo-block

