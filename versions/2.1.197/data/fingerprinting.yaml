deltas_vs_2_1_169:
  - "NEW machineID random token (z5t, cli.beauty.js:606453); sent only as host_name_redacted 12-char slice (cli.beauty.js:299471)"
  - "Runtime Bun 1.3.14 -> 1.4.0 (bun_version:1.4.0 hardcoded cli.beauty.js:299451)"
  - "Provider selector yr() now checks gateway plane first (cli.beauty.js:94637)"
  - "NEW OAuth design/projects scopes (cli.beauty.js:40759)"
  - "Symbol renames: cU->vW, gnH->nit, DQK->$xi, eV_->t$d, XS_->zdm, Kf4->337585 builder"
  - "Unchanged: Datadog client token pubea5604404508cdd34afb69e6f42a05bc; OAuth client ids; plaintext creds; dead keychain save; Segment absent"

uncertainties:
  - "t$d() returns undefined (email stub); no other path repopulating central-bundle email was found"
  - "Server-side schema of trusted-device device_token is opaque to client"
  - "Exact URL receiving the host_name_redacted error payload not pinned (Datadog-style intake; payload shape + z5t().slice(0,12) verified)"
  - "Soft env/runtime/network probe line numbers not exhaustively re-derived for 2.1.197"
