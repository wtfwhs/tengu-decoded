deferred_tools:
  # Tools with shouldDefer:!0 (surfaced lazily via ToolSearch when tool search is active).
  # All MCP tools are also deferred (isMcp===true). isDeferredTool(x4) returns false for
  # alwaysLoad tools, the runtime non-deferrable allow-list (NEW), ToolSearch, fork-Agent,
  # Brief, SendUserFile, and a few context-specific cases.
  mechanism: "isDeferredTool() == x4(e) ; cli.beauty.js:225539 (was bF in 2.1.169)"
  rule: |
    x4(e):
      if e.alwaysLoad === true                 -> NOT deferred
      if tla().includes(e.name)                -> NOT deferred   (NEW runtime allow-list)
      if e.isMcp === true                      -> deferred
      if e.name === ToolSearch (Hh)            -> NOT deferred
      if e.name === Agent (is) && fork-subagent enabled -> NOT deferred
      if e.name === Brief (Pup)                -> NOT deferred
      if e.name === SendUserFile (Mup)         -> NOT deferred
      if e.name === PushNotification (c6) && Ifn()       -> NOT deferred
      if e.name === ScheduleWakeup (Ah) && USe()         -> NOT deferred
      if e.name === EnterWorktree (jSe) && SESSION_KIND==bg -> NOT deferred
      else -> deferred iff e.shouldDefer === true
  runtime_non_deferrable_list:  # NEW vs 2.1.169
    fn: "tla() ; cli.beauty.js:224445"
    sources:
      - "tengu_non_deferrable_builtins feature flag (parsed JSON array of names)"
      - "managed-settings non_deferrable_builtins array"
    default: "fup = [] (empty unless server populates)"
  always_deferred_builtin:
    - WebFetch
    - WebSearch
    - NotebookEdit
    - TodoWrite
    - Skill
    - EnterPlanMode
    - ExitPlanMode
    - ListMcpResourcesTool
    - ReadMcpResourceTool
    - ReadMcpResourceDirTool
    - Monitor
    - ScheduleWakeup
    - TaskCreate
    - TaskGet
    - TaskUpdate
    - TaskList
    - TaskOutput
    - TaskStop
    - CronCreate
    - CronDelete
    - CronList
    - RemoteTrigger
    - PushNotification
    - SendMessage
    - ShareOnboardingGuide
    - EnterWorktree
    - ExitWorktree
    - LSP
    - REPL
    - Workflow
    - DesignSync
  not_deferred_builtin:
    - Bash
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - PowerShell
    - Agent            # unless fork-subagent experiment off
    - AskUserQuestion
    - StructuredOutput
    - ToolSearch        # the search tool itself
    - SendUserMessage   # Brief
    - SendUserFile
    - WaitForMcpServers # no shouldDefer in block
    - ReportFindings    # no shouldDefer
    - ShowOnboardingRolePicker  # no shouldDefer (gated CLAUDE_CODE_REMOTE)
    - Projects          # no shouldDefer (gated)
    - Artifact          # shouldDefer:!1 explicit

tool_search:
  # ToolSearch / deferred-tool system.
  beta_headers:
    - "advanced-tool-use-2025-11-20"   # s4r = FE("tool_search", ...) :100577
    - "tool-search-tool-2025-10-19"    # NMt = FE("tool_search", ...) :100577
  description_const: "$up ; cli.beauty.js:225562"
  modes:
    - mode: "standard"
      meaning: "All non-deferred tools loaded; no tool search."
    - mode: "tst"
      meaning: "Tool search always on (deferred tools surfaced only by name, fetched via ToolSearch)."
    - mode: "tst-auto"
      meaning: "Tool search auto-engaged when deferred-tool prompt size exceeds a char threshold."
  env_var: "ENABLE_TOOL_SEARCH"   # registered :46065 ; auto:N parsed :224403
  env_semantics:
    - "unset / falsy -> 'tst' on first-party Anthropic; 'standard' on Vertex / non-first-party."
    - "'auto'        -> 'tst-auto'"
    - "'auto:N'      -> 'tst-auto' with threshold percentage N (clamped 0..100)"
    - "'0'           -> 'tst' (always search)"
    - "'100'         -> 'standard' (never search)"
    - "truthy        -> 'tst'"
  query_forms:
    - "select:Read,Edit,Grep   (exact by name)"
    - "notebook jupyter        (keyword, ranked)"
    - "+slack send             (require term, rank by rest)"

schema_serialisation:
  function: "Etr(tool, ctx) ; cli.beauty.js:594019"   # was QR8() in 2.1.169
  helper_description_fn: "glm() ; :594009"             # was lsf() ; searchHint when B9o() else 1st para of prompt()
  schema_converter: "JOe(inputSchema) -> JSON Schema"  # was oZH()
  memo_cache: "axi() ; key folds L:/F: prefixes + name + inputJSONSchema hash"  # was lFK()
  fields:
    - "name"
    - "description (glm(): searchHint when B9o() (tool-search/simple), else first paragraph of async prompt())"
    - "input_schema (inputJSONSchema verbatim, or JOe(inputSchema) -> JSON Schema)"
    - "strict (only when it('tengu_tool_pear',!1) AND tool.strict===true AND R3e(model)) ; declared by Bash, Read, Write, Edit, Grep, PowerShell, TodoWrite, ReportFindings (8 tools)"
    - "eager_input_streaming (CLAUDE_CODE_ENABLE_FINE_GRAINED_TOOL_STREAMING / firstParty+tengu_fgts / vertex|bedrock eagerInputStreaming)"
    - "defer_loading (when ctx.deferLoading)"
    - "cache_control (when ctx.cacheControl)"
  property_stripping:  # NEW vs 2.1.169
    fn: "mlm(name, schema) -> flm(schema, plm[name]) ; :594009 / map plm :594449"
    gate: "applied when !ll() (agent-teams disabled)"
    map:
      ExitPlanMode: ["launchSwarm", "teammateCount"]   # plm[cP]
      Agent: ["name", "team_name", "mode"]             # plm[is]
    notes: "Removes team-coordination fields from schemas when teams are off; residue of removed TeamCreate/TeamDelete."
  removed_vs_prior:
    - "input_examples (scarf_coffee beta) -- still absent (was already gone in 2.1.169)"
  beta_stripping: "k3e() (was hyH(); experimental betas disabled) strips everything except name/description/input_schema/cache_control, reported once by hlm() :594073."
  renamed_vs_2_1_169:
    serialiser: "QR8 -> Etr"
    description_helper: "lsf -> glm"
    schema_converter: "oZH -> JOe"
    memo_cache: "lFK -> axi"
    strict_model_check: "SyH -> R3e"
    beta_strip_predicate: "hyH -> k3e"

permission_modes:
  # Canonical enum: sorted const qY :57375 ; Zod enum Vve with .describe() :702208.
  # 'auto' and 'dontAsk' both present. Internal 'bubble' exists for fork-subagent only,
  # filtered out of user-selectable modes at :57389 (return e !== "bubble").
  enum: ["default", "acceptEdits", "bypassPermissions", "plan", "dontAsk", "auto"]
  modes:
    - mode: "default"
      description: "Standard behavior, prompts for dangerous operations."
    - mode: "acceptEdits"
      description: "Auto-accept file edit operations; still asks for other writes/bash."
    - mode: "bypassPermissions"
      description: "Bypass all permission checks (requires allowDangerouslySkipPermissions). Short-circuits to 'allow' (:57414)."
    - mode: "plan"
      description: "Planning mode; no actual tool execution. Write/create tools return behavior:'ask' ('Cannot write ... while in plan mode.'). Read-only tools and read-classified Bash run."
    - mode: "dontAsk"
      description: "Never prompt; deny anything not pre-approved (returns 'deny' :57415)."
    - mode: "auto"
      description: "Use a model classifier to approve/deny permission prompts. Gated by CLAUDE_CODE_ENABLE_AUTO_MODE env + afk-mode-2026-01-31 beta (D0 :100577)."
  internal:
    - mode: "bubble"
      description: "Internal-only permissionMode for the implicit fork subagent (:225525,:476136). Not user-selectable (filtered at :57389)."
  read_only_restriction: |
    In plan mode, a tool's checkPermissions returns behavior:'ask' (decisionReason type:'mode',
    mode:'plan') for any write/create action. Bash is dynamically classified via isReadOnly(cmd).
    bypassPermissions / plan-when-available short-circuit to 'allow' (:57414); dontAsk to 'deny'
    (:57415, :439948, :452099). Unchanged in shape vs 2.1.169.
