# Tool catalog for Claude Code v2.1.197
# Build 2026-06-29T19:08:42Z | Bun 1.4.0 standalone | linux-x86_64
#
# Every built-in tool is constructed via the factory Ys({...}) (was rK in 2.1.169),
# cli.beauty.js:148125. Each tool object carries: name (a string constant), searchHint
# (one-liner used by ToolSearch), async description()/prompt(), get inputSchema()
# (Zod schema, lazily built), and trait methods isReadOnly()/isConcurrencySafe()/
# isEnabled()/shouldDefer/strict. Tool names are stored as mangled top-level const vars
# (e.g. Co="Bash"); internal_name below is the FACTORY var (the object), name_const is
# the string-constant var that holds the user-facing name.
#
# Count: 52 Ys({...}) call sites - 3 non-tools (mcp template, eval_registered__ dynamic,
# TestingPermission) = 49 real built-in tools (was 46 in 2.1.169; +5 new, -2 removed).

