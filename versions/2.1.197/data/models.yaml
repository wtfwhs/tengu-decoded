# ---------------------------------------------------------------------------
# Alias / remap resolution (Bo, defaults O_/nE/Rj/Wje, main-loop Ww/Ey)
# ---------------------------------------------------------------------------
aliases:
  resolver_fn: "Bo (102388, was c7)"
  user_facing_aliases: ["sonnet", "opus", "haiku", "fable", "best", "sonnet[1m]", "opus[1m]", "fable[1m]", "opusplan"]   # Uye (94616)
  short_aliases: ["sonnet", "opus", "haiku", "fable"]   # Hfd (94617)
  catalog_alias_defaults:           # pQs.aliases (94367)
    opus:   {default: "claude-opus-4-8",  per_provider: {bedrock: "claude-opus-4-6", vertex: "claude-opus-4-6", foundry: "claude-opus-4-6", mantle: "claude-opus-4-7", anthropic_aws: "claude-opus-4-7", gateway: "claude-opus-4-7"}}
    sonnet: {default: "claude-sonnet-5",  per_provider: {bedrock: "claude-sonnet-4-5", vertex: "claude-sonnet-4-5", foundry: "claude-sonnet-4-5", mantle: "claude-sonnet-4-5", anthropic_aws: "claude-sonnet-4-6", gateway: "claude-sonnet-4-6"}}
    haiku:  {default: "claude-haiku-4-5"}
    fable:  {default: "claude-fable-5"}
  latest_per_family:                # pQs.latest_per_family (94398)
    fable: "claude-fable-5"
    opus: "claude-opus-4-8"
    sonnet: "claude-sonnet-5"
    haiku: "claude-haiku-4-5"
  resolution:
    opus: "O_() -> ANTHROPIC_DEFAULT_OPUS_MODEL || KHn('opus') = aliases.opus default/per_provider"
    sonnet: "nE() -> ANTHROPIC_DEFAULT_SONNET_MODEL || KHn('sonnet') = aliases.sonnet default (Sonnet 5)"
    haiku: "Rj() -> ANTHROPIC_DEFAULT_HAIKU_MODEL || KHn('haiku') = haiku45"
    fable: "Wje() -> ANTHROPIC_DEFAULT_FABLE_MODEL || L4r() = fable5 (NEW)"
    best: "Zai() (101659) -> Fable 5 if Vle() else Opus (O_)"
    opusplan: "Bo returns resting Sonnet (nE); plan-mode Opus upgrade applied at runtime by rL() (101813)"
    "[1m] suffix": "preserved through alias expansion when CLAUDE_CODE_DISABLE_1M_CONTEXT unset"
  default_model_selection:
    setting_fn: "getDefaultMainLoopModelSetting (Ww, 101860) -> $4r() (101904)"
    rule: >
      Subscription users (Ao): if Max (zle) || Team-5x (Nxe) || Enterprise-usage-based (Xye) -> Opus (O_, +[1m] if cT()).
