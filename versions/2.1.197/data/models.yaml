# Model & routing data for Claude Code 2.1.197
# Source of truth: cli.beauty.js. The model layer was REWRITTEN from the 2.1.169
# hand-coded `tz` object into a Zod-validated declarative catalog:
#   - catalog data `pQs`            (94000-94405)
#   - Zod schema   `hfd`            (94492)  -> parsed by `iMt()` (94507)
#   - lookups: WM(id) (94412), dU(id,cap) (94416), fQs(alias,prov) (94420)
#   - CATALOG_ID_TO_KEY `Sfd` (94570) bridges to legacy routing object `va` = Afd() (94587)
# Alias resolve Bo (102388), defaults O_/nE/Rj/Wje (101772-101807),
# main-loop Ww/Ey (101860-102249), caps (132480-133050, 146660-146945),
# fallback (596700-604480), fast mode + pricing (100577-101086).

catalog:
  schema_version_field: true        # pQs.schema_version, validated by hfd() (94492)
  capabilities_are_data: true       # per-model `capabilities[]` string array, queried via dU(id,cap)
  catalog_id_to_key_map: "Sfd (94570)"   # claude-fable-5->fable5, claude-sonnet-5->sonnet5, ...
  legacy_routing_object: "va (94587, was `tz`)"

