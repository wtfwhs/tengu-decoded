oauth_client_ids:
  production: "9d1c250a-e61b-44d9-88ed-5944d1962f5e"   # cli.beauty.js:40771 (unchanged)
  local_dev: "22422756-60c9-4084-8eb7-27705fd5cf9a"   # cli.beauty.js:40704 (unchanged)
  override_env: "CLAUDE_CODE_OAUTH_CLIENT_ID"

oauth:
  authorize_console: "https://platform.claude.com/oauth/authorize"
  authorize_claude_ai: "https://claude.com/cai/oauth/authorize"
  token_url: "https://platform.claude.com/v1/oauth/token"
  revoke_url: "https://platform.claude.com/v1/oauth/token/revoke"
  hello_url: "https://platform.claude.com/v1/oauth/hello"
  manual_redirect_url: "https://platform.claude.com/oauth/code/callback"
  local_redirect_uri: "http://localhost:{port}/callback"
  client_metadata_url: "https://claude.ai/oauth/claude-code-client-metadata"
  validate_url: "https://api.anthropic.com/api/oauth/validate"   # NEW vs 2.1.169
  pkce: true
  code_challenge_method: "S256"
  beta_header: "oauth-2025-04-20"                                # unchanged
  grant_types: ["authorization_code", "refresh_token"]
  login_methods: ["claudeai", "console", "gateway"]
  scopes:
    base:                                              # Zae (default request set) — unchanged vs 2.1.169
      - "user:profile"
      - "user:inference"
      - "user:sessions:claude_code"
      - "user:mcp_servers"
      - "user:file_upload"
    api_key_minting:                                   # wys
      - "org:create_api_key"
      - "user:profile"
    design:                                            # ele (NEW) — added on demand for Design MCP
      - "user:design:read"
      - "user:design:write"
    design_projects:                                   # Cys (NEW) = ele + projects
      - "user:design:read"
      - "user:design:write"
      - "user:projects:read"
      - "user:projects:write"
    inference_only: ["user:inference"]
  custom_oauth_allowlist:                              # jpn (cli.beauty.js:40777) — unchanged
    - "https://beacon.claude-ai.staging.ant.dev"
    - "https://claude.fedstart.com"
    - "https://claude-staging.fedstart.com"

provider_base_urls:
  # selected by yr() from CLAUDE_CODE_USE_* env vars (cli.beauty.js:94637; gateway checked first)
  - plane: "firstParty"
    base: "https://api.anthropic.com"
    env: "(default), ANTHROPIC_BASE_URL"
  - plane: "bedrock"
    base: "https://bedrock-runtime.{region}.amazonaws.com (control: https://bedrock.{region}.amazonaws.com)"
    env: "CLAUDE_CODE_USE_BEDROCK; ANTHROPIC_BEDROCK_BASE_URL"
  - plane: "mantle"
    base: "https://bedrock-mantle.{region}.api.aws/anthropic"
    env: "CLAUDE_CODE_USE_MANTLE; ANTHROPIC_BEDROCK_MANTLE_BASE_URL"
  - plane: "anthropicAws"
    base: "https://aws-external-anthropic.{region}.api.aws"
    env: "CLAUDE_CODE_USE_ANTHROPIC_AWS; ANTHROPIC_AWS_BASE_URL"
  - plane: "vertex"
    base: "https://{region}-aiplatform.googleapis.com/v1 (global / rep variants)"
    env: "CLAUDE_CODE_USE_VERTEX; ANTHROPIC_VERTEX_BASE_URL + ANTHROPIC_VERTEX_PROJECT_ID"
  - plane: "foundry"
    base: "https://{resource}.services.ai.azure.com/anthropic"
    env: "CLAUDE_CODE_USE_FOUNDRY; ANTHROPIC_FOUNDRY_RESOURCE or ANTHROPIC_FOUNDRY_BASE_URL"
  - plane: "gateway"
    base: "(customer Cloud gateway URL; OIDC device flow)"
    env: "CLAUDE_CODE_USE_GATEWAY; forceLoginGatewayUrl"

plane_gates:
  oauth_capable: "ud() = firstParty | anthropicAws | gateway (cli.beauty.js:94672) — was firstParty-only (o_()) in 2.1.169"
  secondary: "S1() = firstParty | anthropicAws | foundry | mantle (cli.beauty.js:94676)"
  remote_control: "firstParty | gateway (cli.beauty.js:101685,146710,231698)"

env_var_aliases:
  webhook_signing_key: "ANTHROPIC_WEBHOOK_SIGNING_KEY (whsec_...)"
  trusted_device_token: "CLAUDE_TRUSTED_DEVICE_TOKEN -> X-Trusted-Device-Token header"
  beta_tracing_endpoint: "BETA_TRACING_ENDPOINT -> OTLP /v1/traces + /v1/logs (cli.beauty.js:337658)"
  ultrareview_fixture: "CLAUDE_CODE_ULTRAREVIEW_PREFLIGHT_FIXTURE (cli.beauty.js:535172)"

false_positives:
  # _facts.md candidate /v1/* templates that are NOT Claude Code surfaces:
  - path: "/v1/token"
    reason: "Google STS / AWS-SDK vendored code (cli.beauty.js:84038,129732,131278)"
  - path: "/v1/groups"
    reason: "Google Admin Directory API (admin.googleapis.com/admin/directory/v1/groups, cli.beauty.js:721972)"
  - path: "/v1/metrics"
    reason: "Only in doc/skill strings (cli.beauty.js:725031); no live exporter call"

beta_headers:
  # ALL UNCHANGED vs 2.1.169 — no date bumps this build
  managed_agents: "managed-agents-2026-04-01"
