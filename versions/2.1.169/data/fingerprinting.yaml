env_overrides:
  - var: CLAUDE_CODE_HOST_PLATFORM
    effect: forces reported platform (win32/darwin/linux) overriding os.platform()
    function: H3$
    line: cli.beauty.js:45499
  - var: CLAUDE_CONFIG_DIR
    effect: relocates config holding persisted random device_id; change => new device_id
  - var: CLAUDE_CODE_ENABLE_TELEMETRY
    effect: gates third-party OTel path (Kf4) that runs host/os detectors then strips host.id/host.name
  - var: OTEL_RESOURCE_ATTRIBUTES
    effect: parsed by envDetector, merged into OTel resource
  - var: OTEL_SERVICE_NAME
    effect: overrides service.name in envDetector
  - var: OTEL_METRICS_INCLUDE_RESOURCE_ATTRIBUTES
    effect: include OTEL_RESOURCE_ATTRIBUTES on metrics
    default: true
    line: cli.beauty.js:185413
  - var: CLAUDE_CODE_ACCOUNT_TAGGED_ID
