# ── Device trust, auth & credential binding ──
# Device Trust, Auth & Credential Binding — Claude Code 2.1.169
# Partial FP3. Merged into device-fingerprinting.yaml by orchestrator.
# Citations are cli.beauty.js line numbers.

trust_mechanisms:

  trusted_device_token:
    summary: >
      Opaque server-issued bearer string (device_token) gating Remote-Control / bridge
      features. NOT computed locally, NOT derived from machine id. Only the hostname is
      sent to the server at enrollment.
    module_lines: "288285-288473"
    env_override: CLAUDE_TRUSTED_DEVICE_TOKEN   # takes precedence over stored token
    env_override_lines: "288386-288389, 288469-288471"
    obtained_via:
      method: POST
      url: "{BASE_API_URL}/api/auth/trusted_devices"
      auth: "Bearer <oauth access_token>"
      request_body:
        display_name: "Claude Code on ${os.hostname()} · linux"   # only device identifier sent
      response_field: device_token
      logged_field: device_id
      line: "288409-288441"
    stored_in: ".credentials.json -> trustedDeviceToken (plaintext, chmod 0600)"
    stored_reader: "readStoredTrustedDeviceToken (WWH), 288468-288472"
    sent_as_header: X-Trusted-Device-Token
    header_builder: "qP4 (369069-369083)"
    header_injection_sites:
      - "qP4 bridge PR/Slack subscribe (369026, 369054)"
      - "interruptRemoteSession (371879-371886)"
      - "environment runner headers (522413-522414)"
