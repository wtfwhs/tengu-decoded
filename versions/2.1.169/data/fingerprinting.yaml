privacy_security_implications:
  - "Tokens (OAuth + trusted-device + gateway) are plaintext on disk; no machine binding -> trivially portable / exfiltratable"
  - "Trusted-device token lives in the same plaintext file it is meant to protect"
  - "macOS keychain save is dead code in Bun build — likely regression vs prior Node build (inference)"
  - "Trusted-device + attestation are opt-in, org-policy gated; default consumer never enrolls"
  - "OAuth/auth sends no hardware fingerprint; only hostname (trusted-device display_name)"
  - "apiKeyHelper trust gate genuinely blocks settings-based RCE from untrusted dirs"
  - "_CLAUDE_CODE_ASSUME_FIRST_PARTY_BASE_URL can force first-party trust + trace propagation against any base URL"

uncertainties:
  - "Whether dead keychain branch is deliberate Bun-port choice or temporary regression (inference)"
  - "Server-side schema of device_token is opaque to client (only device_id logged)"
  - "Did not trace every downstream consumer of each CLAUDE_CODE_OAUTH_* env accessor thunk"

