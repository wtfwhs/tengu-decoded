version: 2.1.169
build: 2026-06-08T03:22:12Z
git_sha: eb44edf196b8a320135d5a27a3cfba37773ce0cd
scope: full_device_fingerprint
note: >-
  FP1 partial dataset. Owns the hard hardware machine-id and the host/OS
  OpenTelemetry resource attributes only. Soft env/runtime/network signals are
  in data/_fp4.yaml. Other FP agents append to their own partial; this file is
  FP1-exclusive.

machine_identity:
  # The transmitted device_id is NOT the hardware machine-id (see device_id below).
  hardware_machine_id:
    purpose: OpenTelemetry host.id (vendored node-machine-id style detector)
    bundled_at:
      - cli.beauty.js:136682   # first copy of @opentelemetry/resources
      - cli.beauty.js:323174   # second copy (byte-identical)
    dispatcher:
      function: OE_           # second copy: Ic5
      line: cli.beauty.js:136784
      behaviour: lazy require per process.platform, memoised
    hashed: false
    salted: false
    truncated: false
    transmitted_by_default: false
    notes: >-
      Raw platform UUID/GUID, returned unmodified. Read only by the OTel
      hostDetector. Even when OTel telemetry is enabled, Kf4() keeps ONLY
      host.arch and discards host.id and host.name, so the hardware id never
      leaves the device in the default product.
    platforms:
      darwin:
        command: 'ioreg -rd1 -c "IOPlatformExpertDevice"'
        parse: 'find line containing IOPlatformUUID, split on the equals separator, value minus trailing quote'
        line: cli.beauty.js:136685
      linux:
        files:
          - /etc/machine-id
          - /var/lib/dbus/machine-id   # fallback
        parse: readFile(utf8).trim(), first existing wins
        line: cli.beauty.js:136706
      freebsd:
        sources:
          - file: /etc/hostid
          - command: kenv -q smbios.system.uuid   # fallback
        parse: trim()
        line: cli.beauty.js:136727
      win32:
        command: '%windir%\System32\REG.exe QUERY HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography /v MachineGuid'
        registry_key: HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography
        registry_value: MachineGuid
        wow64_shim: 'uses %windir%\sysnative\cmd.exe when arch==ia32 and PROCESSOR_ARCHITEW6432 in env'
        parse: 'split on "REG_SZ", take [1].trim()'
        line: cli.beauty.js:136752
      default:
        result: undefined
        log: 'could not read machine-id: unsupported platform'
        line: cli.beauty.js:136771
    error_handling: 'try/catch each read; on failure only OTel diag.debug("error reading machine id: ...")'

  device_id:
    # This is what is actually transmitted as device_id / user_id / user.id.
    getter: cU
    alias: getOrCreateUserID
    line: cli.beauty.js:141641
    source: persisted random token in global config
    generation: crypto.randomBytes(32).toString("hex")   # 64 hex chars, 256-bit
    crypto_module: require("crypto")  # GeK, cli.beauty.js:141732
    storage: global config file (h$ read 141179 / L8 write 141040); ~/.claude.json or $CLAUDE_CONFIG_DIR
    config_field: userID
    stable: across sessions
    scope: per-install / per-config-dir   # NOT per-hardware
    derived_from_hardware: false
    hashed_before_transmission: false
    salted: false
    truncated: false
    local_hash_only:
      where: feature-flag bucketing
      function: XS_
      line: cli.beauty.js:141899
      formula: parseInt(sha256(cU()).slice(0,8),16) % JS_
      transmitted: false
    transmitted_as:
      - field: device_id
        context: model-API metadata blob (aPH), JSON-stringified into user_id
        line: cli.beauty.js:559637
      - field: deviceId
        context: user-metadata bundle gnH
        line: cli.beauty.js:132451
      - field: user_id
        context: first-party OTel log events
        line: cli.beauty.js:139980
      - field: device_id
        context: GrowthBook experiment events (qG6)
        line: cli.beauty.js:140035
      - field: user.id
        context: third-party OTel resource attrs (BhH)
        line: cli.beauty.js:185364

  naming_collision_warning: >-
    The deviceId fields at cli.beauty.js:12xxx/13xxx/37xxx/523xxx are
    Chrome-extension / browser-bridge instance IDs (select_browser /
    list_connected_browsers) and are unrelated to machine fingerprinting.

  service_instance_id:
    attribute: service.instance.id
    value: crypto.randomUUID()
    stable: false   # fresh per process, not a device id
    line: cli.beauty.js:136918

host_resource_attributes:
  # Attributes describing the host/OS/process. "transmitted" = leaves the device
  # in some default-or-enabled path. host.id/host.name are stripped (see Kf4).
  detectors:
    hostDetector:
      class: vsK
      line: cli.beauty.js:136845
    osDetector:
      class: EsK
      line: cli.beauty.js:136866
    processDetector:
      class: SsK
      line: cli.beauty.js:136886
    serviceInstanceIdDetector:
      class: IsK
      line: cli.beauty.js:136918
    envDetector:
      class: jsK
      line: cli.beauty.js:136577
      reads_env: [OTEL_RESOURCE_ATTRIBUTES, OTEL_SERVICE_NAME]
  third_party_resource_builder:
    function: Kf4
    line: cli.beauty.js:325308
    gate_env: CLAUDE_CODE_ENABLE_TELEMETRY
    behaviour: >-
      Merges service.name/version, osDetector (os.type, os.version), and from
      hostDetector ONLY host.arch. host.id and host.name are explicitly dropped
      at cli.beauty.js:325331.
  attributes:
    - name: host.id
      source: getMachineId() (hardware UUID)
      detector: hostDetector
      transmitted: false   # stripped by Kf4
      identifying: high
    - name: host.name
      source: os.hostname()
      detector: hostDetector
      transmitted: false   # stripped by Kf4
      identifying: high
    - name: host.arch
      source: normalizeArch(os.arch())   # x64->amd64, arm->arm32, ppc->ppc32
      detector: hostDetector
      transmitted: true
      identifying: low
      also_in: [BigQuery exporter resource cli.beauty.js:294428]
    - name: os.type
      source: normalizeType(os.platform())   # win32->windows, sunos->solaris
      detector: osDetector
      transmitted: true
      identifying: low
    - name: os.version
      source: os.release()
      detector: osDetector
      transmitted: true
      identifying: medium
    - name: process.pid
      source: process.pid
      detector: processDetector
      transmitted: false   # detector not run by CC
    - name: process.executable.name
      source: process.title
      detector: processDetector
      transmitted: false
    - name: process.executable.path
      source: process.execPath
      detector: processDetector
      transmitted: false
    - name: process.command_args
      source: '[argv[0], ...execArgv, ...argv.slice(1)]'
      detector: processDetector
      transmitted: false
    - name: process.runtime.version
      source: process.versions.node
      detector: processDetector
      transmitted: false
    - name: process.runtime.name
      value: nodejs
      detector: processDetector
      transmitted: false
    - name: process.owner
      source: os.userInfo().username
      detector: processDetector
      transmitted: false
    - name: service.instance.id
      source: crypto.randomUUID()
      detector: serviceInstanceIdDetector
      stable: false
    - name: wsl.version
      source: r$()/xvH() from /proc/version WSL(\d+) or WSL_DISTRO_NAME
      transmitted: true
      lines: [cli.beauty.js:47744, cli.beauty.js:325324, cli.beauty.js:294431]
      identifying: low
    - name: terminal.type
      source: jE.terminal (TERM_PROGRAM etc.)
      transmitted: true
      attached_by: BhH
      line: cli.beauty.js:185393
      identifying: low

other_host_introspection:
  # read for local logic, NOT used as a transmitted device fingerprint
  - signal: cpu_count
    source: os.cpus().length
    use: local concurrency sizing
    line: cli.beauty.js:373006
  - signal: free_memory
    source: os.freemem()
    use: background-agent memory-pressure decisions
    lines: [cli.beauty.js:11920, cli.beauty.js:542074, cli.beauty.js:659703]
  - signal: timezone
    source: Intl.DateTimeFormat().resolvedOptions().timeZone (qz$)
    use: UI time formatting; China-TZ check (Asia/Shanghai, Asia/Urumqi) for routing
    lines: [cli.beauty.js:11417, cli.beauty.js:211024]
  - signal: locale
    source: Intl.DateTimeFormat().resolvedOptions().locale language (jVq)
    use: local formatting
    line: cli.beauty.js:11423
  - signal: shell
    source: basename of $SHELL/$COMSPEC, whitelisted (Z66/tn$)
    use: env context
    line: cli.beauty.js:45504

telemetry_sdk_constants:
