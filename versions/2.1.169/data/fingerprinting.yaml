# ── Identity & cross-service correlation (account/user/session) ──
# Account, User & Session Identity — structured data (partial _fp2)
# Version 2.1.169 | Build 2026-06-08T03:22:12Z | Bun 1.3.14 | linux-x86_64
# Citations are cli.beauty.js line numbers / minified function names.

identity_fields:
  - name: userID
    aka: [device_id, distinctId, anonymousId, "user.id"]
    role: canonical anonymous/distinct id (device-scoped)
    source: "config ~/.claude.json key `userID`; else generated randomBytes(32).toString('hex') (64 hex)"
    accessor: "cU() — cli.beauty.js:141641"
    persisted: true
    persisted_to: "~/.claude.json (or $CLAUDE_CONFIG_DIR/.claude.json)"
    hashed: false
    hashed_note: "only its sha256 bucket XS_() is hashed for sampling, value itself sent plaintext"
    sent_to: [anthropic_api, growthbook, datadog_seed, otel, first_party_events]

  - name: accountUuid
    aka: [account_uuid, "user.account_uuid"]
    role: canonical authenticated account id
    source: "oauthAccount (OAuth profile /api/oauth/profile, or token, or env)"
    env_override: CLAUDE_CODE_ACCOUNT_UUID
    accessor: "F_()?.accountUuid — cli.beauty.js:131589 ; persisted by TcH() :93835"
    validator: "DQK() length>=8 passthrough (NOT a hash) — cli.beauty.js:132422"
    persisted: true
    persisted_to: "~/.claude.json under oauthAccount"
    hashed: false
    sent_to: [anthropic_api, growthbook, datadog, otel, first_party_events, trusted_device_enroll]

  - name: organizationUuid
    aka: [organization_uuid, "organization.id"]
    role: org / enterprise tenant id
    source: oauthAccount
    env_override: CLAUDE_CODE_ORGANIZATION_UUID
    accessor: "F_()?.organizationUuid"
    hashed: false
    sent_to: [growthbook, datadog, otel, first_party_events, trusted_device_enroll]

  - name: emailAddress
    aka: [email, "user.email"]
    role: account email (PII)
    source: "oauthAccount.emailAddress (profile fetch / token / env)"
    env_override: CLAUDE_CODE_USER_EMAIL
    accessor: "F_()?.emailAddress ; central getter eV_() is a STUB returning undefined :132415"
    hashed: false
    plaintext_pii: true
    sent_to: [otel, oidc_gateway]
    not_sent_to: [growthbook, first_party_events, anthropic_api_metadata]
    note: "eV_() stub means email is absent from gnH/GrowthBook surface in this build; OTel reads oauthAccount.emailAddress directly (unconditional, no env gate)"

  - name: sessionId
    aka: [session_id, "session.id", CLAUDE_CODE_SESSION_ID]
    role: per-conversation id
    source: "B$.sessionId = randomUUID() (:2385); CV() async-local override"
    accessor: "y$() — cli.beauty.js:2465"
    env_export: "CLAUDE_CODE_SESSION_ID (accessor GG1 :45954), re-synced on fork :456346"
    cli_flag: "--session-id"
    hashed: false
    sent_to: [anthropic_api, growthbook, datadog, otel, first_party_events]

  - name: parentSessionId
    aka: [parent_session_id]
    role: session lineage link (fork parent)
    source: "B$.parentSessionId; set by Rl8({setCurrentAsParent}) :2469"
    accessor: "Il8() :2481 ; Xh_() :139144 for agent context"
    hashed: false
    sent_to: [datadog, first_party_events]

  - name: oauthAccount
    role: container object for all account identity + billing
    fields: [accountUuid, emailAddress, organizationUuid, displayName, hasExtraUsageEnabled, billingType, accountCreatedAt, subscriptionCreatedAt, ccOnboardingFlags, claudeCodeTrialEndsAt, claudeCodeTrialDurationDays, seatTier]
    source: "RjH() GET ${BASE_API_URL}/api/oauth/profile :93494 ; persisted TcH() :93835"
    accessor: "h$().oauthAccount ; F_() :131589 (gated by yM() auth check)"
    persisted_to: "~/.claude.json"

  - name: oidc_sub
    aka: ["user.id (gateway)"]
    role: enterprise gateway JWT subject claim
    source: "decoded gateway JWT payload (ni_ base64url :185271)"
    accessor: "iY8() :185283"
    extra_claims: [email, groups]
    identity_source_tag: gateway-oidc
    hashed: false
    sent_to: [otel]
    note: "overrides user.*/identity.* from OTEL_RESOURCE_ATTRIBUTES when present"

  - name: user.account_id
    role: base58-encoded tagged account id (user_01<base58>)
    source: "f37('user', accountUuid) :185329 — strip dashes -> BigInt -> base58 (reversible encoding)"
    env_override: CLAUDE_CODE_ACCOUNT_TAGGED_ID
    hashed: false
    encoding: base58
    sent_to: [otel]
    gate: OTEL_METRICS_INCLUDE_ACCOUNT_UUID

  - name: userBucket
    role: sampling bucket 0-29 (the ONLY hashed identity derivative)
    source: "parseInt(sha256(cU()).slice(0,8),16) % 30"
    accessor: "XS_() — cli.beauty.js:141899"
    hashed: true
    hash_algo: sha256
    sent_to: [datadog]

  - name: userType
    role: caller class (hard-coded)
    value: external
    accessor: "literal 'external' in gnH/j_8 :132466,:139231"
    hashed: false
    sent_to: [growthbook, datadog, otel, first_party_events]

  - name: messages_api_user_id
    aka: [metadata.user_id]
    role: per-request identity blob on Anthropic Messages API
    source: "aPH() :559624 -> CH({device_id:cU(), account_uuid:F_()?.accountUuid??'', session_id:y$(), ...CLAUDE_CODE_EXTRA_METADATA})"
    serializer: "CH = JSON.stringify (:10081)"
    hashed: false
    plaintext_structured: true
    env_extra: CLAUDE_CODE_EXTRA_METADATA
    sent_to: [anthropic_api]
    note: "user_id is a JSON string of an object, not an opaque id"

