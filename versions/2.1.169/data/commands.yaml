# Slash commands — Claude Code 2.1.169
# Build 2026-06-08T03:22:12Z | GIT_SHA eb44edf196b8a320135d5a27a3cfba37773ce0cd
#
# Source of truth: command registry module exporting getCommands (mL), getBuiltinCommands
# (Jof -> cu$()), isCommandEnabled (Uk), meetsAvailabilityRequirement (du$),
# INTERNAL_ONLY_COMMANDS (jof), ANT_GATED_COMMANDS (Dof), REMOTE_SAFE_COMMANDS (Ip8),
# BRIDGE_SAFE_COMMANDS (Q3q).  cli.beauty.js ~522k-547k & 615k.
#
# Status semantics:
#   enabled        -> isEnabled absent or always-true; isHidden absent/false
#   conditional    -> isEnabled gated by a flag / capability / mode / env var
#   hidden         -> isHidden: !0 (or getter true) — runs but not listed in /help
#   disabled       -> isEnabled: () => !1 (cannot run)
#   stub           -> object replaced by a disabled+hidden "stub" placeholder in THIS build
#   upsell-stub    -> wrapped by w1$() = hidden "available with Claude for Enterprise" upsell
#
# Gate helpers (resolved from source):
#   hq()   -> first-party + oauth scopes present (logged in to claude.ai)        [131552]
#   z4()   -> workspace === "remote" (running as a cloud/remote agent)           [3665]
#   F6()   -> !isInteractive  (HEADLESS / non-interactive run)                   [3032]
#   a2()   -> isInteractive
#   K2()   -> CLAUDE_CODE_COORDINATOR_MODE on (coordinator session)              [210508]
#   b7(cap)-> capability check (e.g. "allow_remote_sessions")                    [183916]
#   o_()   -> remote/cloud-bridge plumbing available
#   pq$()  -> o_() && Sh$() && tengu_ccr_bridge flag  (cloud "Claude Code on web") [368642]
#   HB()   -> advisor available (firstParty + tengu_sage_compass2.enabled / env) [287318]
#   RP()   -> workflows feature available & default-on                           [183982]
#   VK$()  -> usage-credits available (lV() balance or nDH())                    [386063]
#   E1$()  -> voice fully available (term + Pu$() + nB8())                        [539273]
#   Cg4()  -> () => !1  (desktop hand-off disabled in this build)                [457614]
#   xF4()  -> hq() && allow_remote_sessions  (autofix-pr)                        [453085]
#   jh()   -> remote-control connectable (pq$() etc.)                            [368654]
#   B0()   -> remote-control currently connected (toggles description)
#   Y$.DISABLE_* -> kill-switch env vars

