availability_gating:
  meetsAvailabilityRequirement: "du$(cmd) — true if cmd has no availability[], else true if any token matches: 'claude-ai' => hq(); 'console' => !hq() && !sc() && zf(). Unknown tokens fail."
  values_seen: ["claude-ai", "console"]
  notes: "Commands carrying availability:['claude-ai'] only appear for users authed to claude.ai (first-party OAuth). 'console' targets API/console (non-claude-ai) enterprise users."

command_filtering_pipeline:
  getCommands_mL: "Sp8() loads builtins+skills+plugins, then filters by du$(availability) && Uk(isEnabled); merges MCP/plugin commands not already present."
  isCommandEnabled_Uk: "return cmd.isEnabled?.() ?? true  (absent isEnabled = enabled)."
  filterCommandsForHeadless: "UOH — drops commands unsuited to non-interactive (F6()) runs."
  filterCommandsForRemoteMode: "c3q — restricts to REMOTE_SAFE_COMMANDS when running as a remote/cloud agent."
  REMOTE_SAFE_COMMANDS: "Ip8 — allow-list usable inside a remote/cloud session (export, clear, model, context, usage, status, help, etc.)."
  BRIDGE_SAFE_COMMANDS: "Q3q — allow-list dispatchable over the Remote Control bridge."
  INTERNAL_ONLY_COMMANDS: "jof — internal/system commands incl. the disabled 'stub', bridge-kick, etc.; not user-listed."
  ANT_GATED_COMMANDS: "Dof = [gu$, m3q, B3q, p3q].filter(Boolean) — all four are null in THIS build, so ANT_GATED is empty."

interesting_properties:
  immediate: "Run the moment Enter is pressed without sending a turn to the model. Often a flag-gated getter (/model, /effort, /plan via tengu_immediate_model_command)."
  supportsNonInteractive: "Command is allowed in headless/-p runs (e.g. /clear, /compact, /usage, /heapdump, /context, /goal-headless)."
  requires: "Capability prerequisites, e.g. /daemon requires {ink:!0} (needs the TUI renderer)."
  dual_variants: "/context, /autocompact, /usage-credits, /goal ship interactive + headless variants gated by F6()/!F6(); the unfit one is isHidden."
