# Claude Code Internal API Endpoints
# Extracted from reverse-engineering analysis of Claude Code v2.1.169
# Build: 2026-06-08T03:22:12Z | GIT_SHA: eb44edf196b8a320135d5a27a3cfba37773ce0cd
#
# Schema extends 2.1.32: endpoints[] (url, host, purpose, category[, method, auth, beta, notes]),
# oauth_client_ids{}, oauth{} (scopes, urls, pkce), provider_base_urls[], telemetry[].
# The big addition vs 2.1.32 is the cloud backend: managed-agents SDK surface
# (/v1/agents, /v1/sessions, /v1/environments, /v1/files, /v1/skills, /v1/user_profiles)
# AND the Claude-Code-on-the-web / Remote-Control surface (/v1/code/sessions...).

endpoints:
  # ── Inference (Messages API) ────────────────────────────────────────
  - url: "/v1/messages"
    host: "api.anthropic.com"
    method: "POST"
    purpose: "Primary inference endpoint (also /v1/messages?beta=true)"
    auth: "x-api-key OR Bearer OAuth"
    category: "inference"
    notes: "Allow-listed body paths set XO_ = {/v1/complete, /v1/messages, /v1/messages?beta=true}. cli.beauty.js:8707,7572,105854"
  - url: "/v1/messages/count_tokens"
    host: "api.anthropic.com"
    method: "POST"
    purpose: "Token counting (beta header token-counting-2024-11-01)"
    auth: "x-api-key OR Bearer OAuth"
    category: "inference"
  - url: "/v1/messages/batches"
    host: "api.anthropic.com"
    method: "POST/GET"
    purpose: "Message Batches API (SDK)"
    auth: "x-api-key OR Bearer OAuth"
    category: "inference"
  - url: "/v1/complete"
    host: "api.anthropic.com"
    method: "POST"
    purpose: "Legacy text-completion (allow-listed, unused by CLI)"
    category: "inference"
  - url: "/v1/models, /v1/models/{id}"
    host: "api.anthropic.com"
    method: "GET"
    purpose: "Model listing / metadata (e.g. /v1/models/claude-opus-4-8)"
    category: "inference"

