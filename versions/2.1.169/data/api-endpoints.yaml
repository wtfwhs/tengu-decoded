oauth_client_ids:
  production: "9d1c250a-e61b-44d9-88ed-5944d1962f5e"
  local_dev: "22422756-60c9-4084-8eb7-27705fd5cf9a"   # reused as the staging/local id (was 'staging' in 2.1.32)
  override_env: "CLAUDE_CODE_OAUTH_CLIENT_ID"           # runtime override of CLIENT_ID

oauth:
  authorize_console: "https://platform.claude.com/oauth/authorize"
  authorize_claude_ai: "https://claude.com/cai/oauth/authorize"   # CHANGED vs 2.1.32 (claude.ai/oauth/authorize)
  token_url: "https://platform.claude.com/v1/oauth/token"
  revoke_url: "https://platform.claude.com/v1/oauth/token/revoke"
  hello_url: "https://platform.claude.com/v1/oauth/hello"
  manual_redirect_url: "https://platform.claude.com/oauth/code/callback"
  local_redirect_uri: "http://localhost:{port}/callback"
  client_metadata_url: "https://claude.ai/oauth/claude-code-client-metadata"
  pkce: true
  code_challenge_method: "S256"
  beta_header: "oauth-2025-04-20"
  grant_types: ["authorization_code", "refresh_token"]
  authorize_params: ["code=true", "client_id", "response_type=code", "redirect_uri",
                     "scope", "code_challenge", "code_challenge_method=S256", "state",
                     "orgUUID?", "login_hint?", "login_method?"]
  login_methods: ["claudeai", "console", "gateway"]   # 'gateway' = Cloud gateway OIDC device flow (NEW)
  scopes:
    base:                                              # XQH (default request set)
      - "user:profile"
      - "user:inference"
      - "user:sessions:claude_code"                    # NEW vs 2.1.32
      - "user:mcp_servers"                             # NEW vs 2.1.32
      - "user:file_upload"                             # NEW vs 2.1.32
    api_key_minting:                                   # DRq (used when creating an API key)
      - "org:create_api_key"
      - "user:profile"
    inference_only: ["user:inference"]                 # when inferenceOnly login
  custom_oauth_allowlist:                              # CLAUDE_CODE_CUSTOM_OAUTH_URL must be one of (Dn$)
    - "https://beacon.claude-ai.staging.ant.dev"
    - "https://claude.fedstart.com"
    - "https://claude-staging.fedstart.com"

provider_base_urls:
  # selected by Mq() from CLAUDE_CODE_USE_* env vars (cli.beauty.js:93073)
  - plane: "firstParty"
    base: "https://api.anthropic.com"
    env: "(default)"
  - plane: "bedrock"
    base: "https://bedrock-runtime.{region}.amazonaws.com (control: https://bedrock.{region}.amazonaws.com)"
    env: "CLAUDE_CODE_USE_BEDROCK; override ANTHROPIC_BEDROCK_BASE_URL"
  - plane: "mantle"
    base: "https://bedrock-mantle.{region}.api.aws/anthropic"
    env: "CLAUDE_CODE_USE_MANTLE; override ANTHROPIC_BEDROCK_MANTLE_BASE_URL"
    notes: "Claude in Amazon Bedrock; model ids carry anthropic. prefix"
  - plane: "anthropicAws"
    base: "https://aws-external-anthropic.{region}.api.aws"
    env: "CLAUDE_CODE_USE_ANTHROPIC_AWS; override ANTHROPIC_AWS_BASE_URL"
    notes: "Claude Platform on AWS; SigV4 service name aws-external-anthropic; bare first-party model ids"
  - plane: "vertex"
    base: "https://{region}-aiplatform.googleapis.com/v1 (global: https://aiplatform.googleapis.com; rep: https://aiplatform.{region}.rep.googleapis.com)"
    env: "CLAUDE_CODE_USE_VERTEX; override ANTHROPIC_VERTEX_BASE_URL + ANTHROPIC_VERTEX_PROJECT_ID"
  - plane: "foundry"
    base: "https://{resource}.services.ai.azure.com/anthropic"
    env: "CLAUDE_CODE_USE_FOUNDRY; ANTHROPIC_FOUNDRY_RESOURCE or ANTHROPIC_FOUNDRY_BASE_URL"
    new_in: "2.1.169"
  - plane: "gateway"
    base: "(customer Cloud gateway URL; OIDC device flow)"
    env: "CLAUDE_CODE_USE_GATEWAY; forceLoginGatewayUrl"
    new_in: "2.1.169"

env_var_aliases:
  anthropic_client_platform_values: ["claude_code_vscode", "claude_code_remote", "sdk-cli", "sdk-ts", "sdk-py", ...]
  entrypoint: "CLAUDE_CODE_ENTRYPOINT (cli|remote|remote_mobile|remote_desktop|sdk-ts|...)"
  webhook_signing_key: "ANTHROPIC_WEBHOOK_SIGNING_KEY (whsec_...)"
  trusted_device_token: "CLAUDE_TRUSTED_DEVICE_TOKEN -> X-Trusted-Device-Token header"
