deferred_tools:
  # Tools with shouldDefer:!0 (surfaced lazily via ToolSearch when tool search is active).
  # All MCP tools are also deferred (isMcp===true). isDeferredTool(bF) returns false for
  # alwaysLoad tools, ToolSearch itself, Brief, SendUserFile, and a few context-specific cases.
  mechanism: "isDeferredTool() == bF(H) in module qR6"
  rule: |
    bF(H):
      if H.alwaysLoad === true            -> NOT deferred
      if H.isMcp === true                 -> deferred
      if H.name === ToolSearch (bO)       -> NOT deferred
      if H.name === Agent (PK) && fork-subagent experiment on -> NOT deferred
      if H.name === Brief (W85)           -> NOT deferred
      if H.name === SendUserFile (Z85)    -> NOT deferred
      if H.name === PushNotification (SF) && wn$()             -> NOT deferred
      if H.name === ScheduleWakeup (F3)  && rfH()              -> NOT deferred
      if H.name === EnterWorktree (ofH) && SESSION_KIND==bg    -> NOT deferred
      else -> deferred iff H.shouldDefer === true
  always_deferred_builtin:
    - WebFetch
    - WebSearch
    - NotebookEdit
    - TodoWrite
    - Skill
    - EnterPlanMode
    - ExitPlanMode
    - ListMcpResourcesTool
    - ReadMcpResourceTool
    - Monitor
    - ScheduleWakeup
    - TaskCreate
    - TaskGet
    - TaskUpdate
    - TaskList
    - TaskOutput
    - TaskStop
    - CronCreate
    - CronDelete
    - CronList
    - RemoteTrigger
    - PushNotification
    - TeamCreate
    - TeamDelete
    - SendMessage
    - ShareOnboardingGuide
    - EnterWorktree
    - ExitWorktree
    - LSP
    - REPL
    - DesignSync
  never_deferred:
    - Bash
    - Read
    - Write
    - Edit
    - Glob
    - Grep
    - PowerShell
    - Agent          # unless fork-subagent experiment off
    - AskUserQuestion
    - StructuredOutput
    - ToolSearch      # the search tool itself
    - SendUserMessage # Brief
    - SendUserFile

tool_search:
  # ToolSearch / deferred-tool system. Master predicate wk() in module containing mR6().
  beta_headers:
    - "advanced-tool-use-2025-11-20"   # X36 = tj("tool_search", ...)
    - "tool-search-tool-2025-10-19"    # Ij$ = tj("tool_search", ...)
  modes:
    - mode: "standard"
      meaning: "All non-deferred tools loaded; no tool search."
    - mode: "tst"
      meaning: "Tool search always on (deferred tools surfaced only by name, fetched via ToolSearch)."
    - mode: "tst-auto"
      meaning: "Tool search auto-engaged when deferred-tool prompt size exceeds a char threshold."
  env_var: "ENABLE_TOOL_SEARCH"
  env_semantics:
    - "unset / falsy -> 'tst' on first-party Anthropic (optimistic default); 'standard' on Vertex / non-first-party."
    - "'auto'        -> 'tst-auto'"
    - "'auto:N'      -> 'tst-auto' with threshold percentage N (clamped 0..100)"
    - "'0' (auto:0)  -> 'tst' (always search)"
    - "'100'         -> 'standard' (never search)"
    - "truthy        -> 'tst'"
  gating:
    - "mR6() decides mode; wk() returns false in 'standard' mode or on Vertex / non-first-party hosts unless ENABLE_TOOL_SEARCH is set."
    - "ts(model) -> false if model in tengu_tool_search_unsupported_models (only Sonnet 4+/Opus 4+/newer support tool_reference blocks)."
    - "hyH() (experimental betas disabled) forces 'standard'."
  threshold:
    "Uu4(tools) = floor(pu4(tools) * EJf); pu4 = floor(promptChars * (Fqq()/100)); Fqq() reads ENABLE_TOOL_SEARCH auto:N (default Uqq)."
  discovery:
    "Discovered tool names are extracted from tool_reference blocks in message history (t7H) and carried across compact boundaries (compactMetadata.preCompactDiscoveredTools)."
  telemetry:
    - "tengu_tool_search_mode_decision (enabled, mode, reason, checkedModel, mcpToolCount, mcpNonBlocking)"
    - "tengu_tool_search_outcome (totalDeferredTools, ...)"
    - "tengu_tool_search_mcp_wait"
    - "tengu_deferred_tool_schema_not_sent"
    - "tengu_deferred_tools_pool_change"

schema_serialisation:
  function: "QR8()"   # was SC$() in 2.1.32
  helper_description_fn: "lsf()"  # returns searchHint when tool search active, else first paragraph of prompt()
  fields:
    - "name"
    - "description (lsf(): searchHint when CLAUDE_CODE_SIMPLE/lwq, else first paragraph of async prompt())"
    - "input_schema (oZH(inputSchema) -> JSON Schema, or inputJSONSchema verbatim; memoised per (model,name) in lFK())"
    - "strict (only when tengu_tool_pear AND tool.strict===true AND model supports it via SyH(model))"
    - "eager_input_streaming (NEW: tengu_fgts / CLAUDE_CODE_ENABLE_FINE_GRAINED_TOOL_STREAMING / vertex|bedrock eagerInputStreaming)"
    - "defer_loading (when ctx.deferLoading)"
    - "cache_control (when ctx.cacheControl)"
  removed_vs_2_1_32:
    - "input_examples (scarf_coffee beta) -- NOT present in 2.1.169"
  beta_stripping: "hyH() (experimental betas disabled) strips everything except name/description/input_schema/cache_control via nsf()."

permission_modes:
  # Canonical enum (line 55067 / Zod enum at 279352). 'delegate' from the 2.1.32 doc is NOT
  # in the real enum; 'auto' (classifier) and 'dontAsk' are. 'bubble' exists internally for
  # the fork-subagent (permissionMode:"bubble") but is not a user-selectable mode.
  enum: ["default", "acceptEdits", "bypassPermissions", "plan", "dontAsk", "auto"]
  modes:
    - mode: "default"
      description: "Standard behavior; prompts for dangerous operations."
    - mode: "acceptEdits"
      description: "Auto-accept file edit operations; still asks for other writes/bash."
    - mode: "bypassPermissions"
      description: "Bypass all permission checks (requires allowDangerouslySkipPermissions). Tool calls auto-allow."
    - mode: "plan"
      description: "Planning mode; no actual tool execution. Write/create tools return behavior:'ask' with 'Cannot write ... while in plan mode.' Read-only tools and read-classified Bash run."
    - mode: "dontAsk"
      description: "Never prompt; deny anything not pre-approved (returns 'deny')."
    - mode: "auto"
      description: "NEW vs 2.1.32 doc. Use a model classifier to approve/deny permission prompts (afk-mode-2026-01-31 beta)."
  internal:
    - mode: "bubble"
      description: "Internal-only permissionMode for the implicit fork subagent (yb agent def). Not user-selectable."
  read_only_restriction: |
    In plan mode, a tool's checkPermissions returns behavior:'ask' (decisionReason type:'mode',
    mode:'plan') for any write/create action. Bash is dynamically classified: isReadOnly(cmd)
    determines whether the command is treated as read-only (allowed) or write (blocked) in plan
    mode. Suggestions offer setMode->acceptEdits to escape. acceptEdits auto-allows edits within
    allowed working dirs; bypassPermissions short-circuits to 'allow'.
