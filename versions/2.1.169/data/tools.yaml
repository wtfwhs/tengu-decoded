# Tool catalog for Claude Code v2.1.169
# Build 2026-06-08T03:22:12Z | Bun 1.3.14 standalone | linux-x86_64
#
# Every built-in tool is constructed via the factory rK({...}) (was the tool-object
# literal in 2.1.32). Each tool object carries: name (a string constant), searchHint
# (one-liner used by ToolSearch), async description()/prompt(), get inputSchema()
# (Zod schema, lazily built), and trait methods isReadOnly()/isConcurrencySafe()/
# isEnabled()/isOpenWorld()/shouldDefer. Tool names are stored as mangled top-level
# const vars (e.g. tq="Bash"); internal_name below is the FACTORY var (the object),
# name_const is the string-constant var that holds the user-facing name.

tools:
  # ---- Always-on core file/shell tools ----
  - name: "Bash"
    internal_name: "Y9"           # name const: tq
    description: "Execute shell commands (with optional run_in_background)"
    category: "read-only-or-write" # isReadOnly() is DYNAMIC: true only if the command classifies as allow
    notes: "strict:!0. isConcurrencySafe == isReadOnly(cmd). Read-classified commands allowed in plan mode; write commands blocked. maxResultSizeChars 30000."
  - name: "Read"
    internal_name: "bY"           # name const: LK
    description: "Read files, images, PDFs, notebooks from the local filesystem"
    category: "read-only"
  - name: "Write"
    internal_name: "TD"           # name const: y1
    description: "Write a file to the local filesystem (create or overwrite)"
    category: "write"
    notes: "strict:!0. Blocked in plan mode. Subagents blocked from writing REPORT/SUMMARY/FINDINGS/ANALYSIS*.md (tengu_subagent_md_report_blocked)."
  - name: "Edit"
    internal_name: "NJ"           # name const: V4
    description: "Modify file contents in place (exact string replacement)"
    category: "write"
    notes: "Blocked in plan mode."
  - name: "Glob"
    internal_name: "Fb"           # name const: s5
    description: "Find files by name pattern or wildcard"
    category: "read-only"
  - name: "Grep"
    internal_name: "yk"           # name const: __
    description: "Search file contents with regex (ripgrep)"
    category: "read-only"
  - name: "PowerShell"
    internal_name: "Dt6"          # name const: dK
    description: "Execute Windows PowerShell commands"
    category: "read-only-or-write"
    notes: "NEW vs 2.1.32. Gated by CLAUDE_CODE_USE_POWERSHELL_TOOL. Windows analogue of Bash."

  # ---- Web tools ----
  - name: "WebFetch"
    internal_name: "ab"           # name const: VL
    description: "Fetch and extract content from a URL"
    category: "read-only"
    notes: "shouldDefer:!0 (deferred). Beta web tools header."
  - name: "WebSearch"
    internal_name: "Zh8"          # name const: Tm
    description: "Search the web for current information"
    category: "read-only"
